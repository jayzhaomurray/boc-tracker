name: Update dashboard

on:
  schedule:
    - cron: "30 12 * * *"   # 8:30 AM EDT (summer) — StatsCan release window
    - cron: "30 13 * * *"   # 8:30 AM EST (winter) — StatsCan release window
    - cron: "0 15 * * *"    # 11:00 AM EDT / 10:00 AM EST — BoC daily yields
  workflow_dispatch:         # manual trigger (plain fetch, no waiting)

permissions:
  contents: write   # required for git-auto-commit-action to push back to main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          # --wait is only useful when racing a StatsCan release window (the two
          # 8:30 AM ET crons). Manual dispatches and the BoC daily cron use plain
          # fetch — no point polling for data that isn't being released.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" != "0 15 * * *" ]; then
            python fetch.py --wait
          else
            python fetch.py
          fi

      - name: Generate section blurbs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Regenerate every section blurb with the latest data. Each blurb is
          # generated, then self-reviewed, then saved (with review flags if any).
          # If ANTHROPIC_API_KEY isn't set in repo Secrets, this step is a no-op
          # — the existing data/blurbs.json (last manual seed) carries through.
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set; skipping blurb regeneration. Set the secret in repo Settings > Secrets to enable automated blurb updates."
          else
            for section in inflation policy labour financial; do
              python analyze.py --section "$section" || echo "::warning::Blurb generation failed for section: $section"
            done
          fi

      - run: python build.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: refresh data and rebuild dashboard"
