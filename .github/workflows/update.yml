name: Update dashboard

on:
  schedule:
    - cron: "30 12 * * *"   # 8:30 AM EDT (summer) — StatsCan release window
    - cron: "30 13 * * *"   # 8:30 AM EST (winter) — StatsCan release window
    - cron: "0 15 * * *"    # 11:00 AM EDT / 10:00 AM EST — BoC daily yields
  workflow_dispatch:         # manual trigger (also uses --wait)

permissions:
  contents: write   # required for git-auto-commit-action to push back to main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 15 * * *" ]; then
            python fetch.py
          else
            python fetch.py --wait
          fi

      - run: python build.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: refresh data and rebuild dashboard"
