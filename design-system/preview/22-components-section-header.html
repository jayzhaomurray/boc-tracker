<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Section header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--paper); }
  .toc { display: flex; align-items: baseline; justify-content: space-between; gap: 18px; }
  .left { display: flex; align-items: baseline; gap: 14px; }
  .num { font: 500 13px/1 var(--font-mono); color: var(--ink-quiet); width: 26px; }
  .eyebrow { display: flex; align-items: center; gap: 10px; }
  .stamp { font: 500 11px/1 var(--font-mono); color: var(--ink-quiet); }
  .title { font-family: var(--font-display); font-weight: 600; font-size: 30px; line-height: 1.1; letter-spacing: -0.012em; color: var(--ink); margin: 8px 0 10px; }
  .lede  { font-family: var(--font-display); font-weight: 400; font-size: 17px; line-height: 1.5; color: var(--ink-sub); max-width: 62ch; }
  .crumbs { font: 500 11px/1 var(--font-mono); color: var(--ink-quiet); }
  .crumbs a { text-decoration: none; color: var(--ink-sub); }
  .foil-rule { margin: 12px 0; max-width: 56px; }
</style>
</head>
<body>
  <div class="toc">
    <div class="left">
      <div class="num">02</div>
      <div>
        <div class="eyebrow"><span class="eyebrow">Monetary policy</span><span class="stamp">· Apr 30, 2026</span></div>
        <div class="foil-rule"></div>
        <div class="title">The Bank is on hold at the upper edge of neutral.</div>
        <div class="lede">Three consecutive meetings without action. Markets price one cut over the next 12 months — no more.</div>
      </div>
    </div>
    <div class="crumbs"><a>Overview</a> &nbsp;/&nbsp; <a>Monetary</a> &nbsp;/&nbsp; <a>Deep-dive ↗</a></div>
  </div>
</body>
</html>
