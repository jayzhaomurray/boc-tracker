<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vault · dark mode</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 24px 32px; background: var(--paper); color: var(--ink); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--rule); border-radius: var(--r-md); padding: 14px; aspect-ratio: 1.4 / 1; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .name { font: 600 10px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-quiet); }
  .sw .val  { font: 500 11px/1.3 var(--font-mono); color: var(--ink-sub); }
  .vault { background: var(--paper); }
  .vellum{ background: var(--vellum); }
  .card  { background: var(--card); }
  .ink   { background: var(--ink); color: var(--paper) !important; }
  .cobalt    { background: var(--cobalt); }
  .vermillion{ background: var(--vermillion); }
  .teal      { background: var(--cat-teal); }
  .pine      { background: var(--cat-pine); }
  .ink .name, .ink .val, .cobalt .name, .cobalt .val, .vermillion .name, .vermillion .val,
  .teal .name, .teal .val, .pine .name, .pine .val { color: oklch(95% 0.01 85 / 0.85); }
</style>
</head>
<body class="vault" data-theme="vault">
  <div class="grid">
    <div class="sw vault"><div class="name">Paper</div><div class="val">--paper<br>14% 0.018 265</div></div>
    <div class="sw vellum"><div class="name">Vellum</div><div class="val">--vellum<br>17%</div></div>
    <div class="sw card"><div class="name">Card</div><div class="val">--card<br>19%</div></div>
    <div class="sw ink"><div class="name">Ink</div><div class="val">--ink<br>95% 0.012 85</div></div>
    <div class="sw cobalt"><div class="name">Cobalt</div><div class="val">--cobalt<br>72% .155 245</div></div>
    <div class="sw vermillion"><div class="name">Vermillion</div><div class="val">--vermillion<br>72% .175 35</div></div>
    <div class="sw teal"><div class="name">Teal</div><div class="val">--cat-teal<br>70% .110 195</div></div>
    <div class="sw pine"><div class="name">Pine</div><div class="val">--cat-pine<br>72% .135 145</div></div>
  </div>
</body>
</html>
