<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display type · Bricolage Grotesque</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); }
  .row { display: flex; align-items: baseline; gap: 24px; padding: 10px 0; border-bottom: 1px solid var(--rule); }
  .row:last-child { border-bottom: 0; }
  .label { font: 600 11px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-quiet); width: 96px; flex: none; padding-top: 6px; font-variant-numeric: tabular-nums; }
  .meta  { margin-left: auto; font: 500 11px/1 var(--font-mono); color: var(--ink-quiet); flex: none; padding-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Display&nbsp;1</div>
    <div class="display-1">Iridian ledger</div>
    <div class="meta">Bricolage Grotesque · Italic · 56/60</div>
  </div>
  <div class="row">
    <div class="label">Display&nbsp;2</div>
    <div class="display-2">The Bank is on hold</div>
    <div class="meta">Italic · 40/44</div>
  </div>
  <div class="row">
    <div class="label">H1</div>
    <h1>Monetary policy</h1>
    <div class="meta">Italic · 32/37</div>
  </div>
  <div class="row">
    <div class="label">H2</div>
    <h2>Three meetings without action</h2>
    <div class="meta">Italic · 24/29</div>
  </div>
</body>
</html>
