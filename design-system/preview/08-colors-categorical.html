<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Categorical palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--paper); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--rule); border-radius: var(--r-md); padding: 12px; background: var(--card); }
  .chip { height: 36px; border-radius: var(--r-sm); margin-bottom: 10px; }
  .name { font: 600 16px/1 var(--font-display); letter-spacing: -0.01em; margin-bottom: 4px; }
  .role { font: 400 11px/1.3 var(--font-sans); color: var(--ink-sub); }
  .var  { font: 500 10px/1.3 var(--font-mono); color: var(--ink-quiet); margin-top: 6px; }
  .a { background: var(--cat-amber); }
  .t { background: var(--cat-teal); }
  .p { background: var(--cat-plum); }
  .g { background: var(--cat-pine); }
  .w { background: var(--cat-walnut); }
  .note { margin-top: 14px; font: 400 11px/1.5 var(--font-sans); color: var(--ink-quiet); border-top: 1px solid var(--rule); padding-top: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip a"></div><div class="name" style="color:var(--cat-amber)">Amber</div><div class="role">Energy</div><div class="var">--cat-amber</div></div>
    <div class="sw"><div class="chip t"></div><div class="name" style="color:var(--cat-teal)">Teal</div><div class="role">Goods</div><div class="var">--cat-teal</div></div>
    <div class="sw"><div class="chip p"></div><div class="name" style="color:var(--cat-plum)">Plum</div><div class="role">Services</div><div class="var">--cat-plum</div></div>
    <div class="sw"><div class="chip g"></div><div class="name" style="color:var(--cat-pine)">Pine</div><div class="role">Food</div><div class="var">--cat-pine</div></div>
    <div class="sw"><div class="chip w"></div><div class="name" style="color:var(--cat-walnut)">Walnut</div><div class="role">5th (sparingly)</div><div class="var">--cat-walnut</div></div>
  </div>
  <div class="note">For conceptually-independent series only. Variants of one thing — SA / NSA, LFS / SEPH — use cool grays, not these.</div>
</body>
</html>
