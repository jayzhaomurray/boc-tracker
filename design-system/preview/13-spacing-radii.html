<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Corner radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--paper); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .cell { text-align: center; }
  .box { height: 72px; border: 1px solid var(--rule-strong); background: var(--card); margin-bottom: 10px; }
  .name { font: 500 11px/1.2 var(--font-mono); color: var(--ink-sub); }
  .px { font: 400 11px/1.2 var(--font-sans); color: var(--ink-quiet); margin-top: 2px; }
  .b-xs { border-radius: var(--r-xs); }
  .b-sm { border-radius: var(--r-sm); }
  .b-md { border-radius: var(--r-md); }
  .b-lg { border-radius: var(--r-lg); }
  .b-xl { border-radius: var(--r-xl); }
  .b-pill { border-radius: var(--r-pill); height: 36px; margin-top: 24px; }
  .note { margin-top: 18px; font: 400 11px/1.5 var(--font-sans); color: var(--ink-quiet); border-top: 1px solid var(--rule); padding-top: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="box b-xs"></div><div class="name">--r-xs</div><div class="px">2 px</div></div>
    <div class="cell"><div class="box b-sm"></div><div class="name">--r-sm</div><div class="px">3 px · inputs</div></div>
    <div class="cell"><div class="box b-md"></div><div class="name">--r-md</div><div class="px">4 px · cards</div></div>
    <div class="cell"><div class="box b-lg"></div><div class="name">--r-lg</div><div class="px">6 px · chart panel</div></div>
    <div class="cell"><div class="box b-xl"></div><div class="name">--r-xl</div><div class="px">8 px · modals</div></div>
    <div class="cell"><div class="box b-pill"></div><div class="name">--r-pill</div><div class="px">999 px · status</div></div>
  </div>
  <div class="note">Small radii throughout. A 16px-rounded card would feel like an iOS widget; this is meant to feel like a printed table.</div>
</body>
</html>
