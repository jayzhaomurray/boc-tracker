<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Editorial pairing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); }
  .eyebrow-row { display: flex; align-items: center; gap: 10px; }
  .foil-rule { margin: 10px 0 14px; max-width: 56px; }
  .title { font-family: var(--font-display); font-weight: 500; font-size: 30px; line-height: 1.1; letter-spacing: -0.012em; color: var(--ink); margin: 0 0 8px; }
  .lede { max-width: 58ch; }
  .stamp { font: 500 11px/1 var(--font-mono); color: var(--ink-quiet); }
</style>
</head>
<body>
  <div class="eyebrow-row">
    <span class="eyebrow">Monetary policy</span>
    <span class="stamp">· Apr 30, 2026</span>
    <span class="foil-dot" style="margin-left:auto"></span>
  </div>
  <div class="foil-rule"></div>
  <h2 class="title">The Bank is on hold at 2.75%</h2>
  <p class="lede">Three consecutive meetings without action. The 2Y GoC trades 30bp below policy, pricing one cut over the next twelve months — no more.</p>
</body>
</html>
