<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Data table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--paper); }
  .frame { background: var(--card); border: 1px solid var(--rule); border-radius: var(--r-md); padding: 4px 14px; }
  table.data td.dir-up   { color: var(--vermillion); }
  table.data td.dir-down { color: var(--cat-pine); }
  .legend { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
  .l-can { background: var(--cobalt); }
  .l-us  { background: var(--vermillion); }
</style>
</head>
<body>
  <div class="frame">
    <table class="data">
      <tr><th>Series</th><th class="num">Latest</th><th class="num">1W</th><th class="num">1M</th><th>As of</th></tr>
      <tr><td><span class="legend l-can"></span>BoC overnight</td><td class="num">2.7500</td><td class="num">0.00</td><td class="num">0.00</td><td>Apr 30</td></tr>
      <tr><td><span class="legend l-can"></span>2Y GoC</td><td class="num">2.4180</td><td class="num dir-down">−0.08</td><td class="num dir-down">−0.21</td><td>Apr 30</td></tr>
      <tr><td><span class="legend l-us"></span>2Y UST</td><td class="num">3.8200</td><td class="num dir-up">+0.04</td><td class="num dir-down">−0.15</td><td>Apr 30</td></tr>
      <tr><td><span class="legend l-can"></span>USDCAD</td><td class="num">1.3620</td><td class="num dir-up">+0.0040</td><td class="num dir-down">−0.0210</td><td>Apr 30</td></tr>
      <tr><td><span class="legend l-can"></span>WTI</td><td class="num">71.42</td><td class="num dir-up">+1.18</td><td class="num dir-up">+3.65</td><td>Apr 30</td></tr>
    </table>
  </div>
</body>
</html>
