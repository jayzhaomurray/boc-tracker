<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Data readouts · IBM Plex Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); }
  .row { display: grid; grid-template-columns: 96px 1fr auto; column-gap: 24px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--rule); }
  .row:last-child { border-bottom: 0; }
  .label { font: 600 11px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-quiet); }
  .meta  { font: 500 11px/1 var(--font-mono); color: var(--ink-quiet); }
  .delta { font: 500 12px/1 var(--font-mono); color: var(--vermillion); margin-left: 8px; }
</style>
</head>
<body>
  <div class="row"><div class="label">Data&nbsp;XL</div><div class="data-xl">2.75<span style="color:var(--ink-quiet);font-size:0.55em;letter-spacing:0">%</span></div><div class="meta">Cascadia Mono · 500 · 36/38 · tabular</div></div>
  <div class="row"><div class="label">Data&nbsp;L</div><div class="data-l">2.3 <span class="delta">↑ 0.1pp</span></div><div class="meta">500 · 24/26</div></div>
  <div class="row"><div class="label">Data&nbsp;M</div><div class="data-m">USDCAD 1.362 &nbsp;·&nbsp; WTI 71.42 &nbsp;·&nbsp; 2Y GoC 2.41</div><div class="meta">500 · 15/20</div></div>
  <div class="row"><div class="label">Data&nbsp;S</div><div class="data-s">Apr&nbsp;30,&nbsp;2026 · refreshed 04:12 ET · −12bp WoW</div><div class="meta">500 · 12/16</div></div>
</body>
</html>
