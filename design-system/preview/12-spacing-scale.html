<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--paper); }
  .row { display: grid; grid-template-columns: 70px 1fr 90px; gap: 14px; align-items: center; padding: 6px 0; }
  .name { font: 500 11px/1 var(--font-mono); color: var(--ink-sub); }
  .bar  { height: 12px; background: var(--ink); border-radius: 1px; }
  .px   { font: 500 11px/1 var(--font-mono); color: var(--ink-quiet); text-align: right; }
</style>
</head>
<body>
  <div class="row"><div class="name">--s-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="name">--s-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="name">--s-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="name">--s-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="name">--s-5</div><div class="bar" style="width:20px"></div><div class="px">20 px</div></div>
  <div class="row"><div class="name">--s-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="name">--s-7</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="name">--s-8</div><div class="bar" style="width:40px"></div><div class="px">40 px</div></div>
  <div class="row"><div class="name">--s-9</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="name">--s-10</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="name">--s-11</div><div class="bar" style="width:80px"></div><div class="px">80 px</div></div>
  <div class="row"><div class="name">--s-12</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
</body>
</html>
