<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--paper); }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 9px 12px; border-bottom: 1px solid var(--rule); text-align: left; vertical-align: middle; }
  th { font: 600 10px/1 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-quiet); }
  .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 10px; }
  .label { font: 600 16px/1 var(--font-display); }
  .var   { font: 500 11px/1.3 var(--font-mono); color: var(--ink-sub); }
  .role  { font: 400 13px/1.4 var(--font-sans); color: var(--ink-sub); }
  .d-above   { background: var(--above-target); }
  .d-on      { background: var(--on-target); }
  .d-below   { background: var(--below-target); }
  .d-easing  { background: var(--easing); }
  .d-tighten { background: var(--tightening); }
</style>
</head>
<body>
  <table>
    <tr><th style="width:42%">Token</th><th>Reads as</th><th style="width:24%">Inherits</th></tr>
    <tr><td><span class="dot d-above"></span><span class="label">Above target</span></td><td class="role">CPI above 2%; rate above neutral.</td><td class="var">--vermillion</td></tr>
    <tr><td><span class="dot d-on"></span><span class="label">On target</span></td><td class="role">In band; at potential.</td><td class="var">--cobalt</td></tr>
    <tr><td><span class="dot d-below"></span><span class="label">Below target</span></td><td class="role">Slack; below band.</td><td class="var">--cat-teal</td></tr>
    <tr><td><span class="dot d-tighten"></span><span class="label">Tightening</span></td><td class="role">Hiking phase.</td><td class="var">--cat-amber</td></tr>
    <tr><td><span class="dot d-easing"></span><span class="label">Easing</span></td><td class="role">Cutting phase.</td><td class="var">--cat-pine</td></tr>
  </table>
</body>
</html>
